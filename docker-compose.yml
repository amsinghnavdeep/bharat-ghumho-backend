services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bharat_ghumho
      POSTGRES_USER: bharat_user
      POSTGRES_PASSWORD: bharat_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bharat_user -d bharat_ghumho"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- API (dev) ---
  api-dev:
    build:
      context: .
      target: dev
    profiles: ["dev"]
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://bharat_user:bharat_pass@postgres:5432/bharat_ghumho
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev

  # --- API (production) ---
  api-prod:
    build:
      context: .
      target: production
    profiles: ["prod"]
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Migrations ---
  migrate:
    build:
      context: .
      target: dev
    profiles: ["migrate"]
    environment:
      - DATABASE_URL=postgresql://bharat_user:bharat_pass@postgres:5432/bharat_ghumho
    depends_on:
      postgres:
        condition: service_healthy
    command: npx prisma migrate dev --name init

  # --- Seed ---
  seed:
    build:
      context: .
      target: dev
    profiles: ["seed"]
    environment:
      - DATABASE_URL=postgresql://bharat_user:bharat_pass@postgres:5432/bharat_ghumho
    depends_on:
      postgres:
        condition: service_healthy
    command: npx prisma db seed

volumes:
  pgdata:
  redisdata:
