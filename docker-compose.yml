services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-bharat}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bharat_dev_123}
      POSTGRES_DB: ${DB_NAME:-bharat_ghumho}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bharat}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app-dev:
    build:
      context: .
      target: dev
    profiles: ["dev"]
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${DB_USER:-bharat}:${DB_PASSWORD:-bharat_dev_123}@postgres:5432/${DB_NAME:-bharat_ghumho}
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev

  app-prod:
    build:
      context: .
      target: production
    profiles: ["prod"]
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  migrate:
    build:
      context: .
      target: dev
    profiles: ["migrate"]
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-bharat}:${DB_PASSWORD:-bharat_dev_123}@postgres:5432/${DB_NAME:-bharat_ghumho}
    depends_on:
      postgres:
        condition: service_healthy
    command: npx prisma migrate deploy

  seed:
    build:
      context: .
      target: dev
    profiles: ["seed"]
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-bharat}:${DB_PASSWORD:-bharat_dev_123}@postgres:5432/${DB_NAME:-bharat_ghumho}
    depends_on:
      postgres:
        condition: service_healthy
    command: npx prisma db seed

volumes:
  pgdata:
  redisdata:
